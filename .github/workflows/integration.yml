##################################################
# Integration Tests Pipeline
# Manual trigger or nightly schedule
##################################################

name: Integration Tests

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to test (leave empty for all)'
        required: false
        default: ''
      timeout:
        description: 'Test timeout in minutes'
        required: false
        default: '30'

  # Nightly schedule (2 AM UTC)
  schedule:
    - cron: '0 2 * * *'

env:
  TF_IN_AUTOMATION: "true"
  GO_VERSION: "1.21"
  TERRAFORM_VERSION: "1.6.6"
  AWS_REGION: "us-east-1"

jobs:
  ##################################################
  # Discover Integration Tests
  ##################################################
  discover:
    name: Discover Tests
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find integration tests
        id: find
        run: |
          cd test
          MODULES=()

          for dir in */; do
            if [ "$dir" = "shared/" ]; then
              continue
            fi

            module_name=$(basename "$dir")

            # Check if module has integration tests
            if grep -r "//go:build integration" "$dir" > /dev/null 2>&1; then
              MODULES+=("$module_name")
              test_count=$(grep -r "func Test" "$dir" | grep -c "integration_test.go" || echo "0")
              echo "  ✓ $module_name: $test_count integration tests"
            fi
          done

          # Convert to JSON array
          if [ ${#MODULES[@]} -eq 0 ]; then
            echo "modules=[]" >> $GITHUB_OUTPUT
          else
            MODULES_JSON=$(printf '%s\n' "${MODULES[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "modules=$MODULES_JSON" >> $GITHUB_OUTPUT
          fi

          echo ""
          echo "📋 Found ${#MODULES[@]} modules with integration tests"

  ##################################################
  # Run Integration Tests
  ##################################################
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: discover
    if: needs.discover.outputs.modules != '[]'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Download Go modules
        working-directory: test
        run: go mod download

      - name: Run integration tests for ${{ matrix.module }}
        working-directory: test
        run: |
          mkdir -p ../junit

          TIMEOUT="${{ github.event.inputs.timeout || '30' }}m"
          echo "🧪 Testing ${{ matrix.module }} with timeout $TIMEOUT..."
          echo "⚠️ This will create actual AWS resources!"

          gotestsum --format standard-verbose \
            --junitfile "../junit/${{ matrix.module }}-integration.xml" \
            --packages="./${{ matrix.module }}/..." \
            -- -tags=integration -timeout "$TIMEOUT" \
            2>&1 | tee "../junit/${{ matrix.module }}-integration.log"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results-${{ matrix.module }}
          path: junit/
          retention-days: 7

  ##################################################
  # Summary
  ##################################################
  integration-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [discover, integration-tests]
    if: always()
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results/
          pattern: integration-results-*
          merge-multiple: true
        continue-on-error: true

      - name: Summarize results
        run: |
          echo "📊 Integration Test Summary"
          echo "==========================="
          echo ""
          echo "Trigger: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo ""

          if [ -d "results" ]; then
            echo "📋 Test Results:"
            ls -la results/ 2>/dev/null || echo "No results found"

            # Count pass/fail from logs
            PASSED=0
            FAILED=0
            for log in results/*.log 2>/dev/null; do
              if [ -f "$log" ]; then
                if grep -q "PASS" "$log"; then
                  ((PASSED++))
                elif grep -q "FAIL" "$log"; then
                  ((FAILED++))
                fi
              fi
            done

            echo ""
            echo "Results: $PASSED passed, $FAILED failed"
          fi

          echo ""
          echo "✅ Integration tests completed"
